component2_txv:
  model:
    backend: auto
    weights: densenet121-res224-all
  training:
    seed: 1337
    device: null
    epochs: 15
    batch_size: 32
    num_workers: 0
    lr: 5.0e-4
    temperature: 0.1
    patience: 5
    # Fix 1: weight of TB binary BCE loss added to the contrastive objective.
    # 1.0 means both losses contribute equally; raise to 2.0 if AUROC matters
    # more than domain separation, lower to 0.5 to keep routing head dominant.
    tb_head_weight: 1.0
    limit_per_domain: null
    save_dir: ${COMPONENT2_SAVE_DIR:-/Volumes/Toshiba HDR/TB_DATA/checkpoints_mirror/component2}
    save_name: component2_routing_head.pt
  data:
    val_split: 0.2
    # NIH excluded: no TB labels so it can only contribute to contrastive loss,
    # which creates a confounding gradient when tb_head_weight > 0.
    exclude_datasets: [nih_cxr14]
